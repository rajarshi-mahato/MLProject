
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Exam Performance Indicator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top left, rgba(0, 255, 255, 0.15), transparent 30%),
                radial-gradient(circle at bottom right, rgba(138, 43, 226, 0.18), transparent 35%),
                linear-gradient(135deg, #050816, #0b1026 45%, #101a3a);
            color: #ffffff;
            padding: 24px;
        }

        .login {
            width: 100%;
            max-width: 920px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 32px;
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 28px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.98rem;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(8, 15, 35, 0.75);
            color: #fff;
            outline: none;
            transition: 0.25s ease;
            font-size: 0.98rem;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        .form-control:focus {
            border-color: rgba(0, 220, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(0, 220, 255, 0.15);
            transform: translateY(-1px);
        }

        select.form-control option {
            background: #0b1026;
            color: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.25);
            transition: 0.25s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(0, 212, 255, 0.35);
        }

        .result-box {
            margin-top: 22px;
            padding: 18px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            text-align: center;
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .result-box span {
            color: #7ee7ff;
        }

        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }

            .login {
                padding: 22px;
            }

            .title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="login">
        <div class="title">Student Exam Performance Indicator</div>
        <div class="subtitle">Predict the maths score using student background details</div>

        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <div class="field">
                <label class="form-label">Gender</label>
                <select class="form-control" name="gender" required>
                    <option class="placeholder" selected disabled value="">Select your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="field">
                <label class="form-label">Race or Ethnicity</label>
                <select class="form-control" name="ethnicity" required>
                    <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="field">
                <label class="form-label">Parental Level of Education</label>
                <select class="form-control" name="parental_level_of_education" required>
                    <option class="placeholder" selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's degree</option>
                    <option value="bachelor's degree">Bachelor's degree</option>
                    <option value="high school">High school</option>
                    <option value="master's degree">Master's degree</option>
                    <option value="some college">Some college</option>
                    <option value="some high school">Some high school</option>
                </select>
            </div>

            <div class="field">
                <label class="form-label">Lunch Type</label>
                <select class="form-control" name="lunch" required>
                    <option class="placeholder" selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free / Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <div class="field full-width">
                <label class="form-label">Test Preparation Course</label>
                <select class="form-control" name="test_preparation_course" required>
                    <option class="placeholder" selected disabled value="">Select Test Course</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="field">
                <label class="form-label">Reading Score out of 100</label>
                <input
                    class="form-control"
                    type="number"
                    name="reading_score"
                    placeholder="Enter your Reading Score"
                    min="0"
                    max="100"
                    required
                />
            </div>

            <div class="field">
                <label class="form-label">Writing Score out of 100</label>
                <input
                    class="form-control"
                    type="number"
                    name="writing_score"
                    placeholder="Enter your Writing Score"
                    min="0"
                    max="100"
                    required
                />
            </div>

            <div class="field full-width">
                <input class="btn-primary" type="submit" value="Predict Your Maths Score" />
            </div>
        </form>

        {% if results %}
        <div class="result-box">
            THE prediction is <span>{{ results }}</span>
        </div>
        {% endif %}
    </div>
</body>
</html>
