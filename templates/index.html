<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Performance Predictor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(circle at top left,
rgba(0,255,255,.15),
transparent 30%),

radial-gradient(circle at bottom right,
rgba(140,0,255,.18),
transparent 35%),

linear-gradient(
135deg,
#050816,
#0b1026,
#101a3a);

overflow:hidden;

color:white;

}

.container{

width:850px;

padding:60px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

text-align:center;

box-shadow:

0 20px 60px rgba(0,0,0,.5);

}

h1{

font-size:56px;

margin-bottom:20px;

font-weight:800;

}

p{

font-size:20px;

opacity:.8;

margin-bottom:40px;

line-height:1.6;

}

.btn{

display:inline-block;

padding:18px 40px;

font-size:20px;

font-weight:bold;

border-radius:15px;

text-decoration:none;

background:

linear-gradient(
90deg,
#00d4ff,
#7c3aed);

color:white;

transition:.3s;

box-shadow:

0 10px 30px rgba(0,212,255,.3);

}

.btn:hover{

transform:translateY(-3px);

box-shadow:

0 15px 40px rgba(0,212,255,.5);

}

.glow{

position:absolute;

width:400px;

height:400px;

border-radius:50%;

background:cyan;

filter:blur(180px);

opacity:.15;

top:-100px;

left:-100px;

}

.glow2{

position:absolute;

width:350px;

height:350px;

border-radius:50%;

background:purple;

filter:blur(160px);

opacity:.18;

bottom:-120px;

right:-120px;

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="glow2"></div>

<div class="container">

<h1>
Student Performance Predictor
</h1>

<p>

Predict student maths performance using
machine learning powered analytics.

</p>

<a href="/predictdata" class="btn">

Launch Predictor →

</a>

</div>

</body>
</html>
